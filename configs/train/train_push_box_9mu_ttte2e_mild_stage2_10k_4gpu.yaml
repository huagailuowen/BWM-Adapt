# Stage 2 TTT-E2E mild run on GPUs 0,1,2,3 using the 9-friction push-box dataset.
# This is the second architecture family: no latent C. The inner loop updates
# late-block residual-adapter fast weights with the video flow-matching loss.
# With tasks_per_epoch=40000 and 4 DDP processes, one epoch gives 10000
# optimizer steps on the main process.

dataset:
  dataset_base_path: "/inspire/hdd/project/robot-reasoning/xuyue-p-xuyue/cy/tool_adaptation_Project/TTTdynamics/repos/FastWAM/data/libero_push_box_friction_9mu_450"
  dataset_metadata_path: "data/push_box_bwm_friction_9mu_450/train.jsonl"
  dataset_repeat: 1
  dataset_num_workers: 1
  data_file_keys: "video,action"

video:
  height: 224
  width: 224
  max_pixels: 16777216
  num_frames: 81
  resize_mode: "fit"
  num_history_frames: 1
  time_division_factor: 4
  time_division_remainder: 1
  spatial_division_factor: 32
  chunk_mode: "static"
  pad_short_chunks: true

model:
  model_paths: "models/Wan2.2-TI2V-5B"
  model_id_with_origin_paths: null
  extra_inputs: null
  fp8_models: null
  offload_models: null
  model_config_path: "configs/model/wan2_2_ti2v_5b.yaml"
  initialize_model_on_cpu: false
  text_mode: "none"
  enable_text: false
  enable_dit: true
  enable_vae: true
  enable_image: false
  action_mode: "adaln"

action:
  action_type: "eef_delta"
  action_stat_path: "data/push_box_bwm_friction_9mu_450/action_stats.json"
  action_dim: 14

physical_context:
  physical_context_mode: "none"
  physical_context_dim: 128
  physical_context_tokens: 1
  physical_context_hidden_dim: 0
  physical_context_init_std: 0.0
  physical_adapter_mode: "residual"
  physical_adapter_rank: 16
  physical_adapter_layers: "last_quarter"
  physical_adapter_gate_init: 0.0

stage2_ttt:
  stage2_group_keys: "source_split,friction_mu"
  stage2_tasks_per_epoch: 40000
  stage2_support_min: 1
  stage2_support_max: 2
  stage2_query_min: 4
  stage2_query_max: 6
  stage2_inner_steps: 5
  stage2_inner_lr: 0.05
  stage2_inner_grad_clip: 1.0
  stage2_query_weight: 1.0
  stage2_show_eval_weight: 0.1
  stage2_gap_weight: 0.2
  stage2_gap_margin: 0.03
  stage2_context_reg_weight: 0.0
  stage2_improvement_eps: 0.0001

stage2_ttte2e:
  ttte2e_inner_param_scope: "lowrank"
  ttte2e_inner_lr: 0.001
  ttte2e_inner_grad_clip: 0.1
  ttte2e_inner_reg_weight: 0.0001
  ttte2e_outer_reg_weight: 0.0001
  ttte2e_second_order: false

training:
  learning_rate: 1e-5
  num_epochs: 1
  trainable_models: "physical_adapter_bank"
  find_unused_parameters: false
  weight_decay: 0.01
  task: "sft"
  seed: 20260628
  mixed_precision: "bf16"
  max_timestep_boundary: 1.0
  min_timestep_boundary: 0.0
  batch_size: 1

output:
  output_path: "./outputs/push_box_9mu_ttte2e_mild_stage2_10k_4gpu"
  remove_prefix_in_ckpt: null
  save_steps: null
  checkpoint_save_minutes: 20
  checkpoint_keep_last: 2
  log_steps: 10
  ckpt_path: "outputs/push_box_9mu_no_c_stage1_ttte2e_10k_4gpu/step-10125.safetensors"
  resume_from: null

lora:
  lora_base_model: null
  lora_target_modules: null
  lora_rank: 32
  lora_checkpoint: null
  preset_lora_path: null
  preset_lora_model: null

gradient:
  use_gradient_checkpointing: true
  use_gradient_checkpointing_offload: false
  gradient_accumulation_steps: 1
  max_grad_norm: 0.5

tracking:
  use_wandb: false
  use_swanlab: false
  swanlab_experiment_name: null
