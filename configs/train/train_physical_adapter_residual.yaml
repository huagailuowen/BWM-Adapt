# BWM-Adapt TTTE2E-style residual-adapter template.
# This trains only a small low-rank residual adapter bank by default.

dataset:
  dataset_base_path: ""
  dataset_metadata_path: null
  dataset_repeat: 1
  dataset_num_workers: 0
  data_file_keys: "video,action"

video:
  height: 288
  width: 384
  max_pixels: 16777216
  num_frames: 81
  resize_mode: "fit"
  num_history_frames: 1
  time_division_factor: 4
  time_division_remainder: 1
  spatial_division_factor: 32
  chunk_mode: "static"

model:
  model_paths: ""
  model_id_with_origin_paths: null
  extra_inputs: null
  fp8_models: null
  offload_models: null
  model_config_path: "configs/model/wan2_2_ti2v_5b.yaml"
  initialize_model_on_cpu: false
  text_mode: "emb"
  enable_text: true
  enable_dit: true
  enable_vae: true
  enable_image: true
  action_mode: "adaln"

action:
  action_type: "eef_delta"
  action_stat_path: null
  action_dim: 14

physical_context:
  physical_context_mode: "none"
  physical_adapter_mode: "residual"
  physical_adapter_rank: 16
  physical_adapter_layers: "uniform:8"
  physical_adapter_gate_init: 0.0
  physical_support_weight: 1.0
  physical_query_weight: 1.0
  physical_specificity_weight: 0.1

training:
  learning_rate: 1e-4
  num_epochs: 1
  trainable_models: "physical_adapter_bank"
  find_unused_parameters: false
  weight_decay: 0.01
  task: "sft"
  seed: 42
  mixed_precision: "bf16"
  max_timestep_boundary: 1.0
  min_timestep_boundary: 0.0
  batch_size: 1

output:
  output_path: "./outputs/physical_adapter_residual"
  remove_prefix_in_ckpt: "pipe.dit."
  save_steps: null
  ckpt_path: null
  resume_from: null

lora:
  lora_base_model: null
  lora_target_modules: null
  lora_rank: 32
  lora_checkpoint: null
  preset_lora_path: null
  preset_lora_model: null

gradient:
  use_gradient_checkpointing: true
  use_gradient_checkpointing_offload: false
  gradient_accumulation_steps: 1
  max_grad_norm: 0.5

tracking:
  use_wandb: false
  use_swanlab: false
  swanlab_experiment_name: null

infer:
  cfg_scale: 5.0
  num_inference_steps: 50
  negative_prompt: "The video is not of a high quality, it has a low resolution. Watermark present in each frame. The background is solid. Strange body and strange trajectory. Distortion"
  negative_prompt_emb: null
  quality: 5
  chunk_infer: true
  fps: 24
  enable_metrics: true
