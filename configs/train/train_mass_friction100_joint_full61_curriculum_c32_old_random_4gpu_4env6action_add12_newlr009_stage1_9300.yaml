# Four-H200 Stage1 joint mass-friction latent-Z scaling experiment.
# Each rank independently samples four environments and six common actions,
# giving 24 sequential microbatches/rank and an effective DDP batch of 96.
# The random C32 curriculum starts with 12 uniformly spaced environments and
# adds 12 environments per round until all 100 environments are active.

dataset:
  dataset_base_path: "/afs/ir/users/c/y/cyzhou05/TTT-Physics/datasets/mass-fric/libero_two_box_mass_friction_balanced100env_9action_900eps_lerobot_2026-07-18_hai-machine"
  dataset_metadata_path: "data/mass_friction_joint100_bwm_full61_20260718/train.jsonl"
  dataset_repeat: 1
  dataset_num_workers: 0
  data_file_keys: "video,action"

video:
  height: 224
  width: 224
  max_pixels: 16777216
  num_frames: 61
  resize_mode: "fit"
  num_history_frames: 1
  time_division_factor: 4
  time_division_remainder: 1
  spatial_division_factor: 32
  chunk_mode: "static"
  pad_short_chunks: true

model:
  model_paths: "models/Wan2.2-TI2V-5B"
  model_id_with_origin_paths: null
  extra_inputs: null
  fp8_models: null
  offload_models: null
  model_config_path: "configs/model/wan2_2_ti2v_5b.yaml"
  initialize_model_on_cpu: false
  text_mode: "none"
  enable_text: false
  enable_dit: true
  enable_vae: true
  enable_image: false
  action_mode: "adaln"

action:
  action_type: "eef_delta"
  action_stat_path: "data/mass_friction_joint100_bwm_full61_20260718/action_stats.json"
  action_dim: 14

physical_context:
  physical_context_mode: "both"
  physical_context_dim: 32
  physical_context_tokens: 1
  physical_context_hidden_dim: 128
  physical_context_init_std: 0.0
  physical_context_init_value: 0.5
  physical_adapter_mode: "none"
  physical_adapter_rank: 16
  physical_adapter_layers: "all"
  physical_adapter_gate_init: 0.0

grouped_context_stage1:
  grouped_context_init_mode: "uniform"
  grouped_context_init_value: 0.5
  grouped_context_init_std: 0.0
  grouped_context_init_min: 0.0
  grouped_context_init_max: 1.0
  grouped_context_clamp_min: 0.0
  grouped_context_clamp_max: 1.0
  grouped_context_lr: 0.03
  grouped_context_new_context_lr: 0.09
  grouped_context_model_lr_warmup_steps: 100
  grouped_context_weight_decay: 0.0
  grouped_context_structured_updates: 9300
  grouped_context_friction_groups_per_update: 4
  grouped_context_actions_per_update: 6
  grouped_context_microbatches_per_update: 24
  grouped_context_curriculum_initial_groups: 12
  grouped_context_curriculum_add_groups: 12
  grouped_context_curriculum_total_groups: 100
  grouped_context_curriculum_initial_model_steps: 300
  grouped_context_curriculum_new_context_steps: 200
  grouped_context_curriculum_all_context_steps: 200
  grouped_context_curriculum_model_steps: 200

training:
  learning_rate: 1e-5
  num_epochs: 1
  trainable_models: "dit,action_encoder,physical_context_encoder"
  find_unused_parameters: true
  weight_decay: 0.01
  task: "sft"
  seed: 20260719
  mixed_precision: "bf16"
  max_timestep_boundary: 1.0
  min_timestep_boundary: 0.0
  batch_size: 1

output:
  output_path: "./outputs/mass_friction100_c32_oldrandom_4h200_pergpu4e6a_add12_newlr009_PENDING_JOB"
  remove_prefix_in_ckpt: "pipe.dit."
  save_steps: 500
  checkpoint_save_minutes: 60
  checkpoint_keep_last: 2
  log_steps: 10
  ckpt_path: "ckpt/BLM/step-12000.safetensors"
  resume_from: null

lora:
  lora_base_model: null
  lora_target_modules: null
  lora_rank: 32
  lora_checkpoint: null
  preset_lora_path: null
  preset_lora_model: null

gradient:
  use_gradient_checkpointing: true
  use_gradient_checkpointing_offload: false
  gradient_accumulation_steps: 1
  max_grad_norm: 0.5

tracking:
  use_wandb: false
  use_swanlab: false
  swanlab_experiment_name: null
