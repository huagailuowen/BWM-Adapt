# Stage 1 oracle-C pretraining on event-tap segmented80 push-motion 161-frame chunks.
# The metadata provides physical_context=[friction_mu / 0.25].

dataset:
  dataset_base_path: "/afs/ir/users/c/y/cyzhou05/TTT-Physics/datasets/pushbox/libero_push_box_event_tap_segmented80_10action_hidden_lerobot_A500_offset160_stop_2026-07-05_hai-machine"
  dataset_metadata_path: "data/push_box_bwm_event_tap_segmented80_10action_A500_offset160_stop_pushmotion161_10chunk_20260705/train_oracle_mu025_c1.jsonl"
  dataset_repeat: 10
  dataset_num_workers: 2
  data_file_keys: "video,action"

video:
  height: 224
  width: 224
  max_pixels: 16777216
  num_frames: 161
  resize_mode: "fit"
  num_history_frames: 1
  time_division_factor: 4
  time_division_remainder: 1
  spatial_division_factor: 32
  chunk_mode: "static"
  pad_short_chunks: true

model:
  model_paths: "models/Wan2.2-TI2V-5B"
  model_id_with_origin_paths: null
  extra_inputs: null
  fp8_models: null
  offload_models: null
  model_config_path: "configs/model/wan2_2_ti2v_5b.yaml"
  initialize_model_on_cpu: false
  text_mode: "none"
  enable_text: false
  enable_dit: true
  enable_vae: true
  enable_image: false
  action_mode: "adaln"

action:
  action_type: "eef_delta"
  action_stat_path: "data/push_box_bwm_event_tap_segmented80_10action_A500_offset160_stop_pushmotion161_10chunk_20260705/action_stats.json"
  action_dim: 14

physical_context:
  physical_context_mode: "both"
  physical_context_dim: 1
  physical_context_tokens: 1
  physical_context_hidden_dim: 128
  physical_context_init_std: 0.0
  physical_context_init_value: 0.5
  physical_adapter_mode: "none"
  physical_adapter_rank: 16
  physical_adapter_layers: "all"
  physical_adapter_gate_init: 0.0

training:
  learning_rate: 1e-5
  num_epochs: 1
  trainable_models: "dit,action_encoder,physical_context_encoder"
  find_unused_parameters: true
  weight_decay: 0.01
  task: "sft"
  seed: 20260705
  mixed_precision: "bf16"
  max_timestep_boundary: 1.0
  min_timestep_boundary: 0.0
  batch_size: 1

output:
  output_path: "./outputs/push_box_event_tap_segmented80_pushmotion161_10chunk_oracle_c1_stage1_40k_ga8_PENDING_JOB"
  remove_prefix_in_ckpt: "pipe.dit."
  save_steps: 5000
  checkpoint_save_minutes: 20
  checkpoint_keep_last: 0
  log_steps: 10
  ckpt_path: "ckpt/BLM/step-12000.safetensors"
  resume_from: null

lora:
  lora_base_model: null
  lora_target_modules: null
  lora_rank: 32
  lora_checkpoint: null
  preset_lora_path: null
  preset_lora_model: null

gradient:
  use_gradient_checkpointing: true
  use_gradient_checkpointing_offload: false
  gradient_accumulation_steps: 8
  max_grad_norm: 0.5

tracking:
  use_wandb: false
  use_swanlab: false
  swanlab_experiment_name: null
