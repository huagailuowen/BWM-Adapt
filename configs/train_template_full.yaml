# ============================================================================
# Dataset Configuration
# ============================================================================
dataset:
  # [REQUIRED] Base path of the dataset.
  dataset_base_path: ""

  # [OPTIONAL] Path to the metadata file of the dataset. 
  dataset_metadata_path: null

  # [TUNABLE] Number of times to repeat the dataset per epoch. 
  dataset_repeat: 1

  # [OPTIONAL] Number of workers for data loading.
  dataset_num_workers: 0

  # [OPTIONAL] Data file keys in the metadata. Comma-separated.
  data_file_keys: "image,video"

# ============================================================================
# Video Configuration
# ============================================================================
video:
  # [KEY] Height of images. Leave `height` and `width` empty to enable dynamic resolution.
  height: null

  # [KEY] Width of images. Leave `height` and `width` empty to enable dynamic resolution. 
  width: null

  # [OPTIONAL] Maximum number of pixels per frame, used for dynamic resolution. 
  max_pixels: 1048576

  # [KEY] Number of frames per video. Frames are sampled from the video prefix. 
  num_frames: 81

  # [OPTIONAL] Resize behavior: crop (center crop), fit (no crop). 
  resize_mode: "fit"

  # [KEY] Number of conditioning history frames. Must satisfy 1 <= num_history_frames < num_frames.
  num_history_frames: 1

# ============================================================================
# Model Configuration
# ============================================================================
model:
  # [REQUIRED] Paths to load models. In JSON format.
  model_paths: null

  # [OPTIONAL] Model ID with origin paths, e.g., Wan-AI/Wan2.1-T2V-1.3B:diffusion_pytorch_model*.safetensors. Comma-separated.
  model_id_with_origin_paths: null

  # [OPTIONAL] Additional model inputs, comma-separated. 
  extra_inputs: null

  # [OPTIONAL] Models with FP8 precision, comma-separated.
  fp8_models: null

  # [OPTIONAL] Models with offload, comma-separated. Only used in splited training.
  offload_models: null

  # [KEY] Path to model config YAML.
  model_config_path: "configs/wan2_1_fun_1_3b_inp.yaml"

  # [OPTIONAL] Whether to initialize models on CPU.
  initialize_model_on_cpu: false

  # [KEY] Execution mode for the text module: 't5' (full inference), 'emb' (use pre-extracted embeddings), 'none' (disabled). 
  text_mode: "emb"

  # [OPTIONAL] Enable DiT diffusion model.
  enable_dit: true

  # [OPTIONAL] Enable VAE model.
  enable_vae: true

  # [OPTIONAL] Enable image encoder (CLIP).
  enable_image: true

  # [KEY] Action injection mode: noise (per-frame), adaln (global), none (disabled).
  action_mode: "noise"

# ============================================================================
# Action Configuration
# ============================================================================
action:
  # [KEY] Action/state representation: joint/eef × abs/delta. (choices: "joint_abs", "eef_abs", "joint_delta", "eef_delta")
  action_type: "eef_delta"

  # [OPTIONAL] Path to robot normalization stats (stat.json).
  action_stat_path: null

# ============================================================================
# Training Configuration
# ============================================================================
training:
  # [TUNABLE] Learning rate. 
  learning_rate: 1e-4

  # [TUNABLE] Number of epochs. 
  num_epochs: 1

  # [KEY] Models to train, e.g., dit, vae, text_encoder.
  trainable_models: null

  # [OPTIONAL] Whether to find unused parameters in DDP.
  find_unused_parameters: false

  # [TUNABLE] Weight decay.
  weight_decay: 0.01

  # [OPTIONAL] Task type.
  task: "sft"

  # [OPTIONAL] Random seed for python/numpy/torch. 
  seed: 42

  # [OPTIONAL] Mixed precision mode. 
  mixed_precision: "bf16"

  # [OPTIONAL] Max timestep boundary (for mixed models, e.g., Wan-AI/Wan2.2-I2V-A14B).
  max_timestep_boundary: 1.0

  # [OPTIONAL] Min timestep boundary (for mixed models, e.g., Wan-AI/Wan2.2-I2V-A14B).
  min_timestep_boundary: 0.0

  # [TUNABLE] Batch size per GPU.
  batch_size: 1

# ============================================================================
# Output Configuration
# ============================================================================
output:
  # [KEY] Output save path.
  output_path: "./models"

  # [OPTIONAL] Remove prefix in ckpt. (default: "pipe.dit.")
  remove_prefix_in_ckpt: "pipe.dit."

  # [OPTIONAL] Number of checkpoint saving intervals. If None, checkpoints will be saved every epoch.
  save_steps: null

  # [OPTIONAL] Path to model checkpoint (.safetensors) used to initialize training weights (model-only resume).
  ckpt_path: null

  # [OPTIONAL] Path to a checkpoint directory saved by accelerator (e.g., output_path/epoch-0).
  resume_from: null

# ============================================================================
# LoRA Configuration
# ============================================================================
lora:
  # [OPTIONAL] Which model LoRA is added to.
  lora_base_model: null

  # [OPTIONAL] Which layers LoRA is added to.
  lora_target_modules: "q,k,v,o,ffn.0,ffn.2"

  # [TUNABLE] Rank of LoRA. 
  lora_rank: 32

  # [OPTIONAL] Path to the LoRA checkpoint. If provided, LoRA will be loaded from this checkpoint.
  lora_checkpoint: null

  # [OPTIONAL] Path to the preset LoRA checkpoint. If provided, this LoRA will be fused to the base model.
  preset_lora_path: null

  # [OPTIONAL] Which model the preset LoRA is fused to.
  preset_lora_model: null

# ============================================================================
# Gradient Configuration
# ============================================================================
gradient:
  # [KEY] Whether to use gradient checkpointing.
  use_gradient_checkpointing: false

  # [KEY] Whether to offload gradient checkpointing to CPU memory. 
  use_gradient_checkpointing_offload: false

  # [TUNABLE] Gradient accumulation steps. 
  gradient_accumulation_steps: 1

  # [OPTIONAL] Maximum gradient norm for clipping. (default: 0.5)
  max_grad_norm: 0.5

# ============================================================================
# Tracking Configuration
# ============================================================================
tracking:
  # [OPTIONAL] Enable Weights & Biases tracking.
  use_wandb: false

  # [OPTIONAL] Enable SwanLab tracking.
  use_swanlab: false

  # [OPTIONAL] SwanLab experiment name. Defaults to output_path.
  swanlab_experiment_name: null

# ============================================================================
# Inference Configuration (for validation during training)
# ============================================================================
infer:
  # [OPTIONAL] CFG scale for generation.
  cfg_scale: 5.0

  # [OPTIONAL] Number of inference steps. 
  num_inference_steps: 50

  # [OPTIONAL] Negative prompt for generation.
  negative_prompt: "The video is not of a high quality, it has a low resolution. Watermark present in each frame. The background is solid. Strange body and strange trajectory. Distortion"

  # [OPTIONAL] Path to the pre-extracted negative prompt embedding.
  negative_prompt_emb: null

  # [OPTIONAL] Output video quality. 
  quality: 5

  # [OPTIONAL] Disable chunked inference with 81-frame segments.
  chunk_infer: true

  # [OPTIONAL] Output video FPS.
  fps: 24

  # [OPTIONAL] Disable evaluation metrics.
  enable_metrics: true